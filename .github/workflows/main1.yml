name: 自动调用API解密影视配置

on:
  schedule:
    - cron: '0 0 * * *' # 每天早上 8:00 自动运行
  workflow_dispatch:     # 支持手动点击按钮运行

jobs:
  decrypt_job:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 请求解密接口并保存
      run: |
        curl -X POST "http://2015888.xyz/jiemi/get_jiemi.php" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          -d "url=http://我不是.摸鱼儿.top" \
          -o tv_config.json

    - name: 验证并强行提交到仓库
      run: |
        # 1. 配置 Git 机器人信息
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 2. 检查下载的数据是否合法（包含影视配置特征）
        if [ -f "tv_config.json" ] && grep -q -E "spider|sites" tv_config.json; then
          
          # 使用 -f 强行添加，防止被 .gitignore 规则意外拦截
          git add -f tv_config.json
          
          # 检查是否有任何变化（包括新文件的创建）
          if ! git diff --cached --quiet; then
            git commit -m "自动同步解密配置: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD
            echo "【成功】最新影视配置已强行推送至你的远程仓库！"
          else
            echo "【提示】内容确实与上一次完全一致，且文件已存在，无需重复提交。"
          fi

        else
          echo "【错误】抓取到的内容不包含标准的影视配置结构！"
          echo "以下为接收到的服务器原始响应（前20行）："
          head -n 20 tv_config.json
          exit 1
        fi
