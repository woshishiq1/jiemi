name: 自动调用API解密影视配置

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上 8:00 自动运行
  workflow_dispatch:     # 支持在 GitHub 页面上点击按钮手动触发运行

jobs:
  decrypt_job:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 请求解密接口并保存
      run: |
        # 模拟浏览器向 get_jiemi.php 接口发送 POST 请求
        # 注意：如果抓包发现载荷参数名不是 url 而是 text，请把下方 url= 换成 text=
        curl -X POST "http://2015888.xyz/jiemi/get_jiemi.php" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          -d "url=http://我不是.摸鱼儿.top" \
          -o tv_config.json

    - name: 验证并提交解密后的配置文件
      run: |
        # 配置 Git 机器人信息
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 检查下载的文件是否包含 spider 或 sites，防止接口挂掉下载了错误信息
        if [ -f "tv_config.json" ] && grep -q -E "spider|sites" tv_config.json; then
          # 检查文件内容是否有变化
          if ! git diff --quiet tv_config.json; then
            git add tv_config.json
            git commit -m "自动同步解密配置: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "同步成功，最新影视配置已保存至仓库！"
          else
            echo "配置内容没有发生变化，无需更新。"
          fi
        else
          echo "错误：抓取到的内容不包含标准的影视配置结构，请检查解密接口返回内容。"
          echo "以下为接收到的错误响应内容："
          cat tv_config.json
          exit 1
        fi
